[build.processing.html]
  pretty_urls = false

# The extensionless-redirect function only acts on extensionless paths (it
# redirects /doc/apps/erts to /doc/apps/erts/ or foo to foo.html). Without
# excludedPath the function is still *invoked* for every .html page, asset and
# trailing-slash directory request under the docs tree — it just calls
# context.next() — which burns through the edge-function invocation quota.
# Excluding paths with an extension (/doc/*.*) and trailing-slash directory URLs
# (/doc/*/) leaves only the extensionless requests the function actually handles.
[[edge_functions]]
  path = "/doc"
  function = "extensionless-redirect"

[[edge_functions]]
  path = "/doc/*"
  excludedPath = ["/doc/*.*", "/doc/*/"]
  function = "extensionless-redirect"

[[edge_functions]]
  path = "/docs"
  function = "extensionless-redirect"

[[edge_functions]]
  path = "/docs/*"
  excludedPath = ["/docs/*.*", "/docs/*/"]
  function = "extensionless-redirect"
