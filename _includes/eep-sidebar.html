<aside class="sidebar text-muted collapse-expand-lg">
    <div class="border-bottom navbar-light">
        <button class="navbar-toggler mb-2" type="button" data-bs-toggle="collapse"
            data-bs-target="#eepSidebarToggle" aria-controls="eepSidebarToggle"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <strong class="text-nowrap ps-3">All EEPs</strong>
    </div>
    <div id="eepSidebarToggle" class="collapse navbar-collapse">
        <nav>
            <ul class="nav flex-column text-nowrap">
                {% assign sortedEEPs = site.eeps | sort: 'Num' %}
                {% for eep in sortedEEPs %}
                <li class="nav-item">
                    <a class="nav-link py-1" href="{% link {{ eep.path }} %}">
                        EEP {{ eep.Num }}{% if eep.Title %}: {{ eep.Title }}{% endif %}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </nav>
    </div>
</aside>
